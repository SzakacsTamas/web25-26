<div class="d-flex justify-content-center">
  <div class="card HoverNot col-lg-6 col-12">
    <div class="p-3">
      <h1 class="text-center">Saját fiók kezelése</h1>
      <hr>
      <div class="fs-5">
        
        <!-- Profilkép -->
        <div class="mb-4 text-center">
          <label class="form-label d-block mb-2">Profilkép</label>
          <img id="profilePic" src="https://via.placeholder.com/120" class="rounded-circle mb-2" style="width:120px;height:120px;object-fit:cover;">
          <div>
            <input class="form-control form-control-sm" type="file" id="profileUpload" accept="image/*" onchange="previewProfile(event)">
          </div>
        </div>

        <!-- Felhasználónév -->
        <div class="mb-4 text-start">
          <label class="form-label">Felhasználónév</label>
          
          <input type="text" class="form-control" placeholder="Új felhasználónév">
        </div>

        <!-- E-mail -->
        <div class="mb-4 text-start">
          <label class="form-label">E-mail</label>
          <input type="email" class="form-control" placeholder="Új e-mail cím">
        </div>

        <!-- Jelszó -->
        <div class="mb-4 text-start">
          <label class="form-label">Jelszó</label>
          <input type="password" class="form-control" placeholder="Új jelszó">
        </div>

        <hr>
        <div class="d-flex justify-content-center gap-2">
          <button class="btn btn-outline-success">Mentés</button>
          <button class="btn btn-outline-danger">Mégse</button>
        </div>

      </div>
    </div>
  </div>
</div>
