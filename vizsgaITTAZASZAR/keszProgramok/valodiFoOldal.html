/* From Uiverse.io by 3bdel3ziz-T */ 
/* The switch container */
.switch {
  --transition: 300ms;
  --transition500: 500ms;
  --color-dark: #0c0f14;
  --color-darkGray: #21262e;
  --color-gray: #52555a;
  --color-offwhite: #cecece;
  --shadow-color: var(--color-dark);
  position: relative;
  display: flex;
  align-items: center;
  width: 3rem;
  height: fit-content;
  background-color: var(--color-dark);
  border-radius: 30px;
  padding: 4px;
  transition: var(--transition500);
  user-select: none;
  cursor: pointer;
  overflow: hidden;
}

/* Svg styles */
.switch .svg {
  transition: var(--transition);
  position: absolute;
  left: 5px;
}
.switch .moon {
  width: 18px;
  fill: var(--color-gray);
  opacity: 1;
}

.switch .sun {
  transform: translateY(-50%);
  width: 12px;
  height: 12px;
  border-radius: 50%;
  left: calc(100% - 21.5px);
  top: 15px;
  display: flex;
  align-items: center;
  justify-content: center;
  scale: 0.8;
  opacity: 0;
}

.switch .sun .dot {
  position: relative;
  display: block;
  width: 3px;
  height: 3px;
  border-radius: 50%;
  background: var(--color-dark);
  background: white;
  z-index: 1;
  box-shadow: 11px 0px 0px var(--shadow-color),
    10.3px 0px 0px var(--shadow-color), -11px 0px 0px var(--shadow-color),
    -10.3px 0px 0px var(--shadow-color), 0px -11px 0px var(--shadow-color),
    0px -10.3px 0px var(--shadow-color), 0px 11px 0px var(--shadow-color),
    0px 10.3px 0px var(--shadow-color), 8px 8px 0px var(--shadow-color),
    7.3px 7.3px 0px var(--shadow-color), 8px -8px 0px var(--shadow-color),
    7.3px -7.3px 0px var(--shadow-color), -8px -8px 0px var(--shadow-color),
    -7.3px -7.3px 0px var(--shadow-color), -8px 8px 0px var(--shadow-color),
    -7.3px 7.3px 0px var(--shadow-color);
}

.switch .sun .dot::before {
  content: "";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: white;
  border: 2px solid var(--color-dark);
}

/*checkbox styles */
.switch .circle {
  appearance: none;
  position: relative;
  width: 25px;
  height: 25px;
  border-radius: 50%;
  left: 0;
  background-color: var(--color-darkGray);
  border: 1px solid var(--color-darkGray);
  transition: var(--transition500);
  box-shadow: 1px 1px 20px 3px var(--color-darkGray);
}

.switch:has(.circle:checked) {
  background: var(--color-offwhite);
}

.switch .circle:hover {
  margin-left: 3px;
}
.switch .circle:checked:hover {
  margin-left: -3px;
}

.switch .circle:checked {
  left: calc(100% - 24px);
  background: white;
  border-color: white;
  box-shadow: 1px 1px 30px 12px white;
}

.switch:has(.circle:checked) > .sun {
  opacity: 1;
}

.switch:has(.circle:checked) > .moon {
  opacity: 0;
}

    <script>
const userRole = "teacher"; // "teacher"
function applyRole(role) {
  document.querySelectorAll("[data-role]").forEach(el => {
    const roles = el.dataset.role.split(" ");
    el.style.display = roles.includes(role) ? "" : "none";
  });
}

applyRole(userRole);


      const btn = document.getElementById("hamburgerBtn");
      const sidebar = document.getElementById("sidebar");
      const content = document.getElementById("content");

      btn.addEventListener("click", () => {
        sidebar.classList.toggle("expanded");
        content.classList.toggle("shifted");
      });

      const toggle = document.getElementById("themeToggle");

      // Betöltéskor ellenőrizzük az elmentett módot
      if (localStorage.getItem("theme") === "light") {
        document.body.classList.add("light");
        toggle.checked = true;
      }

      toggle.addEventListener("change", () => {
        document.body.classList.toggle("light");

        if (document.body.classList.contains("light")) {
          localStorage.setItem("theme", "light");
        } else {
          localStorage.setItem("theme", "dark");
        }
      });


      function loadTananyag(file) {
        
  fetch(`tananyagok/${file}`)
    .then(response => {
      if (!response.ok) throw new Error("Nem található");
      return response.text();
    })
    .then(html => {
      document.getElementById("contentInner").innerHTML = html;
      history.pushState({ file }, "", `?tananyag=${file}`);
       initPassword(); // 🔥 EZ KELL IDE
    })
    
    .catch(err => {
      document.getElementById("contentInner").innerHTML =
        "<p>❌ Hiba a tananyag betöltésekor.</p>";
    });

}

/* Vissza gomb kezelése */
window.addEventListener("popstate", e => {
  if (e.state?.file) {
    loadTananyag(e.state.file);
  }
});

/* Oldal betöltés URL-ből */
window.addEventListener("load", () => {
  const params = new URLSearchParams(window.location.search);
  const file = params.get("tananyag");
  if (file) loadTananyag(file);
});

}

<script>
const WORD_CAP = 20;

function editWord() {
  const span = document.getElementById("word");
  const currentText = span.innerText;

  const input = document.createElement("input");
  input.type = "text";
  input.value = currentText;
  input.maxLength = WORD_CAP;
  input.classList.add("editable-input");

  span.replaceWith(input);
  input.focus();

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      saveWord(input);
    }
  });

  input.addEventListener("blur", function() {
    saveWord(input);
  });
}

function saveWord(input) {

  let value = input.value || "Üres";

  if (value.length > WORD_CAP) {
    value = value.substring(0, WORD_CAP);
  }

  const span = document.createElement("span");
  span.id = "word";
  span.innerText = value;

  input.replaceWith(span);
}

const PASS_CAP = 20;
let passwordVisible = false;

// INIT (ez kell!)
function initPassword() {
  const span = document.getElementById("password");
  const real = span.dataset.real || "";
  span.innerText = "•".repeat(real.length);
}

// 👁 toggle
function togglePassword() {
  const span = document.getElementById("password");
  const real = span.dataset.real || "";

  passwordVisible = !passwordVisible;

  if (passwordVisible) {
    span.innerText = real;
  } else {
    span.innerText = "•".repeat(real.length);
  }
}

// ✐ szerkesztés (ugyanaz mint a word, csak dataset!)
function editPassword() {
  const span = document.getElementById("password");
  const currentText = span.dataset.real || "";

  const input = document.createElement("input");
  input.type = passwordVisible ? "text" : "password"; // 👈 figyeld ezt!
  input.value = currentText;
  input.maxLength = PASS_CAP;
  input.classList.add("editable-input");

  span.replaceWith(input);
  input.focus();

  input.addEventListener("keydown", function(e) {
    if (e.key === "Enter") {
      savePassword(input);
    }
  });

  input.addEventListener("blur", function() {
    savePassword(input);
  });
}

// mentés
function savePassword(input) {
  let value = input.value || "";

  if (value.length > PASS_CAP) {
    value = value.substring(0, PASS_CAP);
  }

  const span = document.createElement("span");
  span.id = "password";
  span.dataset.real = value;

  // 👁 állapot megtartása!
  if (passwordVisible) {
    span.innerText = value;
  } else {
    span.innerText = "•".repeat(value.length);
  }

  input.replaceWith(span);
}

</script>
